<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Tienda Gamer</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
color:#38bdf8;
margin-top:40px;
}

.productos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
width:220px;
box-shadow:0px 0px 15px black;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:12px;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<h1>🎮 Tienda Gamer</h1>

<div class="productos">

<div class="card">

<img src="https://static.wikia.nocookie.net/roblox/images/6/6c/Robux.png">

<h3>800 Robux</h3>
<p>$7 USD</p>

<a href="https://www.paypal.com">
<button>Comprar</button>
</a>

</div>

<div class="card">

<img src="https://cdn2.unrealengine.com/fortnite-vbucks-1920x1080-1920x1080-66c7b27c1d6a.jpg">

<h3>1000 Pavos</h3>
<p>$8 USD</p>

<a href="https://www.mercadopago.com">
<button>Comprar</button>
</a>

</div>

<div class="card">

<img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Discord_logo.svg">

<h3>Discord Nitro</h3>
<p>$5 USD</p>

<a href="https://www.paypal.com">
<button>Comprar</button>
</a>

</div>

<div class="card">

<img src="https://rocketleague.media.zestyio.com/rl_logo.jpg">

<h3>1100 Créditos Rocket League</h3>
<p>$9 USD</p>

<a href="https://www.mercadopago.com">
<button>Comprar</button>
</a>

</div>

</div>

</body>
</html>
