<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Tienda Gamer</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:40px;
color:#38bdf8;
font-size:40px;
}

.productos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
width:220px;
transition:0.3s;
box-shadow:0 0 15px black;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:12px;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

footer{
margin-top:60px;
opacity:0.7;
}

</style>

</head>

<body>

<h1>🎮 Tienda Gamer</h1>
<p>Robux • Pavos • Discord Nitro • Rocket League</p>

<div class="productos">

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-9c2b4d8eae8c9a7a2ef9b5e1c0f4c2b8/768/432/Image/Webp/noFilter">
<h3>800 Robux</h3>
<p>$7 USD</p>
<button onclick="comprar('Robux')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn2.unrealengine.com/fortnite-vbucks-1920x1080-1920x1080-66c7b27c1d6a.jpg">
<h3>1000 Pavos</h3>
<p>$8 USD</p>
<button onclick="comprar('Pavos')">Comprar</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Discord_logo.svg">
<h3>Discord Nitro</h3>
<p>$5 USD</p>
<button onclick="comprar('Nitro')">Comprar</button>
</div>

<div class="card">
<img src="https://rocketleague.media.zestyio.com/rl_logo.jpg">
<h3>1100 Créditos Rocket League</h3>
<p>$9 USD</p>
<button onclick="comprar('Rocket League')">Comprar</button>
</div>

</div>

<footer>
<p>© 2026 Tienda Gamer</p>
</footer>

<script>

function comprar(producto){
alert("Elegiste comprar: " + producto + ". Próximamente pagos con MercadoPago y PayPal.");
}

</script>

</body>
</html>
